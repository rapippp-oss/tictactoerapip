<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe 2 Pemain</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,
        #0047AB 0%,
        #6A0DAD 50%,
        #C00000 100%);
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(8px);
    padding:30px;
    border-radius:20px;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:10px;
}

.creator{
    margin-bottom:20px;
    font-size:16px;
    font-weight:bold;
    color:#f0f0f0;
}

#status{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-template-rows:repeat(3,100px);
    gap:8px;
    justify-content:center;
}

.cell{
    background:white;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.cell:hover{
    transform:scale(1.05);
}

.x{
    color:#8B0000; /* Merah pekat */
}

.o{
    color:#00008B; /* Biru pekat */
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:white;
    color:#333;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#eaeaea;
}
</style>
</head>
<body>

<div class="container">
    <h1>🎮 Tic Tac Toe 2 Pemain</h1>
    <div class="creator">Made by Isa Rafif Nailu</div>

    <div id="status">Giliran: X</div>

    <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button onclick="resetGame()">Main Lagi</button>
</div>

<script>
const cells = document.querySelectorAll('.cell');
const statusText = document.getElementById('status');

let currentPlayer = "X";
let gameActive = true;
let board = ["","","","","","","","",""];

const winConditions = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

cells.forEach(cell => {
    cell.addEventListener('click', handleClick);
});

function handleClick() {
    const index = this.dataset.index;

    if(board[index] !== "" || !gameActive) return;

    board[index] = currentPlayer;
    this.textContent = currentPlayer;

    if(currentPlayer === "X"){
        this.classList.add("x");
    } else {
        this.classList.add("o");
    }

    checkWinner();

    if(gameActive){
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusText.textContent = "Giliran: " + currentPlayer;
    }
}

function checkWinner(){
    let won = false;

    for(let condition of winConditions){
        const [a,b,c] = condition;

        if(
            board[a] &&
            board[a] === board[b] &&
            board[a] === board[c]
        ){
            won = true;
            break;
        }
    }

    if(won){
        statusText.textContent = "🎉 Pemain " + currentPlayer + " Menang!";
        gameActive = false;
        return;
    }

    if(!board.includes("")){
        statusText.textContent = "🤝 Permainan Seri!";
        gameActive = false;
    }
}

function resetGame(){
    board = ["","","","","","","","",""];
    currentPlayer = "X";
    gameActive = true;

    statusText.textContent = "Giliran: X";

    cells.forEach(cell => {
        cell.textContent = "";
        cell.classList.remove("x","o");
    });
}
</script>

</body>
</html>
